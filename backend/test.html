<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Room Search Test</title>
    <style>
        body { font-family: system-ui, sans-serif; padding: 20px; max-width: 600px; margin: auto; }
        .search-box { background: #f4f4f9; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        .room-card { border: 1px solid #ddd; padding: 15px; margin-bottom: 10px; border-radius: 8px; }
        .unavailable { background-color: #ffeaea; border-color: #ffb3b3; color: #a00; }
        .technologies { font-size: 0.9em; color: #555; }
        .time-slots { font-size: 0.9em; color: #0070f3; }
        button { padding: 8px 16px; cursor: pointer; background: #0070f3; color: white; border: none; border-radius: 4px; }
        button:hover { background: #005bb5; }
        
        /* NEW: Timeline CSS for User Story 6 */
        .timeline-container {
            position: relative;
            width: 100%;
            height: 30px;
            background-color: #e0e0e0; /* Gray represents available time */
            border-radius: 4px;
            margin-top: 15px;
            overflow: hidden;
        }
        .timeline-booked {
            position: absolute;
            height: 100%;
            background-color: #ff4d4f; /* Red represents booked time */
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .timeline-booked:hover {
            opacity: 0.8;
        }
        .timeline-labels {
            display: flex;
            justify-content: space-between;
            font-size: 0.7em;
            color: #666;
            margin-top: 5px;
        }
    </style>
</head>
<body>

    <h2>Search Available Rooms</h2>
    
    <div class="search-box">
        <label for="capacity"><strong>Minimum Capacity:</strong></label>
        <input type="number" id="capacity" min="1" placeholder="e.g. 4" style="margin-right: 15px; padding: 4px;">
        
        <label style="margin-right: 15px;">
            <input type="checkbox" id="hideBooked"> Hide Fully Booked
        </label>
        
        <button onclick="searchRooms()">Search</button>
    </div>

    <div id="results">
        </div>

    <script>
        async function searchRooms() {
            const capacity = document.getElementById('capacity').value;
            const hideBooked = document.getElementById('hideBooked').checked;
            const resultsDiv = document.getElementById('results');
            
            // Display loading state
            resultsDiv.innerHTML = "<p>Loading rooms...</p>";

            // 1. Build the dynamic URL with query parameters
            let url = 'http://localhost:3000/api/rooms?';
            if (capacity) url += `capacity=${capacity}&`;
            if (hideBooked) url += `hideBooked=true`;

            try {
                // 2. Fetch data from your Express backend
                const response = await fetch(url);
                const rooms = await response.json();

                resultsDiv.innerHTML = ''; // Clear loading text

                if (rooms.length === 0) {
                    resultsDiv.innerHTML = "<p>No rooms match your search criteria.</p>";
                    return;
                }

                // 3. Loop through the database results and generate HTML for each room
                rooms.forEach(room => {
                    const isFullyBooked = room.is_fully_booked;
                    
                    // Handle styles and text for unavailable rooms
                    const cardClass = isFullyBooked ? 'room-card unavailable' : 'room-card';
                    const statusText = isFullyBooked ? '<strong>(Fully Booked)</strong>' : '<span style="color: green;">(Available)</span>';
                    
                    // Format the arrays cleanly (fallback to 'None' if null/empty)
                    const techList = room.technology && room.technology.length > 0 
                        ? room.technology.join(', ') 
                        : 'None';
                    const slotList = room.available_time_slots && room.available_time_slots.length > 0 
                        ? room.available_time_slots.join(', ') 
                        : 'No slots available';

                    // NEW: Generate the HTML blocks for each booking
                    let bookingsHTML = '';
                    if (room.bookings && room.bookings.length > 0) {
                        room.bookings.forEach(booking => {
                            // Calculate width and position based on a 24-hour clock (percentage)
                            const leftPosition = (booking.start_hour / 24) * 100;
                            const width = ((booking.end_hour - booking.start_hour) / 24) * 100;
                            
                            const privacyStatus = booking.is_private ? "Private Booking" : "Public Booking";
                            const hoverText = `${privacyStatus} (${booking.start_hour}:00 - ${booking.end_hour}:00)`;

                            // The 'title' attribute provides instant tooltips on hover
                            bookingsHTML += `
                                <div class="timeline-booked" 
                                     title="${hoverText}" 
                                     style="left: ${leftPosition}%; width: ${width}%;">
                                </div>
                            `;
                        });
                    }

                    // 4. Inject the room details and timeline into the UI
                    const roomHTML = `
                        <div class="${cardClass}">
                            <h3 style="margin-top: 0;">Room ${room.room_name} ${statusText}</h3>
                            <p><strong>Capacity:</strong> ${room.capacity} people</p>
                            <p class="technologies"><strong>Included Tech:</strong> ${techList}</p>
                            <p class="time-slots"><strong>Time Slots:</strong> ${slotList}</p>
                            
                            <h4 style="margin-bottom: 5px;">24-Hour Availability</h4>
                            <div class="timeline-container">
                                ${bookingsHTML}
                            </div>
                            <div class="timeline-labels">
                                <span>0:00</span>
                                <span>6:00</span>
                                <span>12:00</span>
                                <span>18:00</span>
                                <span>24:00</span>
                            </div>
                        </div>
                    `;
                    resultsDiv.innerHTML += roomHTML;
                });

            } catch (error) {
                console.error("Error fetching rooms:", error);
                resultsDiv.innerHTML = "<p style='color: red;'>Error connecting to the server. Make sure your Node backend is running!</p>";
            }
        }
    </script>
</body>
</html>
